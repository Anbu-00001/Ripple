# Faultline change-impact GATE — reusable CI include.
#
# In your project: set a CI/CD variable FAULTLINE_TOKEN (access token, `api`
# scope, masked), then add to .gitlab-ci.yml:
#   include:
#     - remote: 'https://gitlab.com/anbuchelvanganesan.cse2024-group/faultline/-/raw/main/ci/faultline-gate.yml'
#
# On every merge request it pulls the call graph from GitLab Orbit, computes the
# FULL transitive reverse-CALLS closure of the changed symbols (Orbit's DSL caps
# traversals at max_hops=3; Faultline is unbounded), flags untested impacted
# symbols, posts a Markdown verdict to the MR, and FAILS the pipeline (blocks the
# merge) when untested-impacted symbols exceed the threshold.
#
# Gating is OPT-IN so dropping this include into an unfamiliar repo never blocks a
# merge on the first run: by default ($FAULTLINE_GATE unset) the job is comment-only.
# Set a CI/CD variable FAULTLINE_GATE to a number N to fail the pipeline when MORE
# than N untested-impacted symbols are found (FAULTLINE_GATE=0 is strict / zero-tolerance).
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

faultline-gate:
  image: rust:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    - |
      apt-get update -qq && apt-get install -y -qq golang-go jq curl git >/dev/null
      git clone --depth 1 "https://gitlab.com/anbuchelvanganesan.cse2024-group/faultline.git" /tmp/faultline
      ( cd /tmp/faultline/engine && cargo build --release -q )
      ( cd /tmp/faultline/agent && go build -o /usr/local/bin/faultline-agent . )
  script:
    - |
      export GITLAB_TOKEN="$FAULTLINE_TOKEN"
      CHANGED=$(curl -s -H "Authorization: Bearer $FAULTLINE_TOKEN" "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/changes" | jq -r '.changes[].new_path' | paste -sd, -)
      echo "Faultline: changed files = $CHANGED"
      faultline-agent --mode rest --project-id "$CI_PROJECT_ID" --changed-files "$CHANGED" \
        --engine /tmp/faultline/engine/target/release/faultline-engine \
        --repo-root "$CI_PROJECT_DIR" --post-mr "$CI_MERGE_REQUEST_IID" \
        --html-out "$CI_PROJECT_DIR/faultline-graph.html" \
        --codequality-out "$CI_PROJECT_DIR/gl-code-quality-report.json" \
        --gate-untested "${FAULTLINE_GATE:--1}"
  # Two surfaces survive a gate failure (when:always):
  #  - the interactive blast-radius graph, exposed in the MR widget ("View exposed
  #    artifact"); on gitlab.com it downloads (text/plain) and opens interactive in
  #    any browser — enable GitLab Pages to preview it inline.
  #  - a Code Quality report, so every untested impacted function shows in the MR
  #    Reports tab (Free tier; inline on the diff on Ultimate). Code Quality is
  #    ADVISORY — it never blocks a merge on its own; the gate above does that.
  artifacts:
    when: always
    expose_as: 'Faultline interactive graph'
    paths:
      - faultline-graph.html
    reports:
      codequality: gl-code-quality-report.json
    expire_in: 1 week
